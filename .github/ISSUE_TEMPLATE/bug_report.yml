name: "🐛 Bug Report"
description: File a report to help us fix an issue with the Amazon Price Tracker
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below so we can replicate and fix it.
  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Terminal Logs / Error Output
      description: Please copy and paste any relevant error messages or Selenium logs here.
      render: shell
  - type: dropdown
    id: environment
    attributes:
      label: Operating System
      options:
        - Windows
        - MacOS
        - Linux
    validations:
      required: true
